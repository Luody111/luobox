<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>luobox Mobile Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }

    /* Desktop version - hidden on mobile */
    .desktop-only { display: block; }
    .mobile-only { display: none; }

    /* Mobile version - shown on small screens */
    @media (max-width: 767px) {
      .desktop-only { display: none !important; }
      .mobile-only { display: block !important; }
    }

    /* Mobile Styles */
    .mobile-container {
      min-height: 100vh;
      background: #fff;
    }
    .mobile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .mobile-logo {
      font-size: 24px;
      font-weight: bold;
      color: #2563EB;
    }
    .mobile-hero {
      background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }
    .mobile-hero h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .mobile-hero p {
      opacity: 0.9;
      font-size: 14px;
    }
    .mobile-search-box {
      margin-top: 16px;
      background: white;
      border-radius: 22px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mobile-search-box input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 14px;
    }
    .mobile-content {
      padding: 20px 16px;
    }
    .mobile-category-section {
      margin-bottom: 24px;
    }
    .mobile-cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .mobile-cat-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mobile-cat-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    .mobile-cat-title {
      font-size: 18px;
      font-weight: 600;
      color: #1A1A2E;
    }
    .mobile-more-link {
      color: #6B8AFF;
      text-decoration: none;
      font-size: 13px;
    }
    .mobile-card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .mobile-site-card {
      background: white;
      border-radius: 16px;
      padding: 12px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.08);
      border: 1px solid #F3F4F6;
    }
    .mobile-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .mobile-card-icon-bg {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
    .mobile-card-name {
      font-size: 15px;
      font-weight: 600;
      color: #1A1A2E;
    }
    .mobile-card-desc {
      font-size: 12px;
      color: #6B6B8A;
    }
    .mobile-more-card {
      background: #F0F4FF;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #D0DBFE;
    }
    .mobile-more-plus {
      font-size: 28px;
      color: #6B8AFF;
    }
    .mobile-more-text {
      font-size: 14px;
      color: #6B8AFF;
      font-weight: 500;
    }
    .mobile-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 12px 24px 21px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    }
    .mobile-pill {
      display: flex;
      justify-content: space-around;
      background: #F8FAFC;
      border-radius: 36px;
      padding: 4px;
      border: 1px solid #E2E8F0;
    }
    .mobile-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 20px;
      border-radius: 26px;
      text-decoration: none;
      gap: 4px;
    }
    .mobile-tab.active {
      background: #2563EB;
      color: white;
    }
    .tab-label {
      font-size: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Desktop Version (Hidden on Mobile) -->
  <div class="desktop-only">
    <div style="padding:40px;text-align:center;background:#f0f0f0;min-height:100vh;">
      <h1>Desktop Version</h1>
      <p>This is the desktop version (visible on screens >= 768px)</p>
      <p style="color:#666;margin-top:20px;">Resize your browser to less than 768px to see mobile version</p>
    </div>
  </div>

  <!-- Mobile Version (Hidden on Desktop) -->
  <div class="mobile-only mobile-container">

    <!-- Header -->
    <div class="mobile-header">
      <span class="mobile-logo">luobox</span>
      <span style="font-size:22px;">🔍</span>
    </div>

    <!-- Hero Banner -->
    <div class="mobile-hero">
      <h1>发现精彩网站</h1>
      <p>10 大分类 · 500+ 精选网站</p>
      <div class="mobile-search-box">
        <span>🔍</span>
        <input type="text" placeholder="搜索网站..." />
      </div>
    </div>

    <!-- Content Area -->
    <div class="mobile-content">

      <!-- Video Category -->
      <section class="mobile-category-section">
        <div class="mobile-cat-header">
          <div class="mobile-cat-left">
            <div class="mobile-cat-icon" style="background:#EF4444;">▶</div>
            <h2 class="mobile-cat-title">视频网站</h2>
          </div>
          <a href="#" class="mobile-more-link">更多 ›</a>
        </div>
        <div class="mobile-card-grid">
          <a href="https://www.bilibili.com" target="_blank" class="mobile-site-card">
            <div class="mobile-card-top"><div class="mobile-card-icon-bg" style="background:#FB7185;">B</div><span class="mobile-card-name">哔哩哔哩</span></div>
            <p class="mobile-card-desc">国内最大弹幕视频平台</p>
          </a>
          <a href="https://www.youtube.com" target="_blank" class="mobile-site-card">
            <div class="mobile-card-top"><div class="mobile-card-icon-bg" style="background:#FF0000;">▶</div><span class="mobile-card-name">YouTube</span></div>
            <p class="mobile-card-desc">全球最大视频分享平台</p>
          </a>
          <a href="#" class="mobile-more-card">
            <span class="mobile-more-plus">+</span>
            <span class="mobile-more-text">更多</span>
          </a>
        </div>
      </section>

      <!-- Knowledge Category -->
      <section class="mobile-category-section">
        <div class="mobile-cat-header">
          <div class="mobile-cat-left">
            <div class="mobile-cat-icon" style="background:#3B82F6;">📚</div>
            <h2 class="mobile-cat-title">知识网站</h2>
          </div>
          <a href="#" class="mobile-more-link">更多 ›</a>
        </div>
        <div class="mobile-card-grid">
          <a href="https://www.zhihu.com" target="_blank" class="mobile-site-card">
            <div class="mobile-card-top"><div class="mobile-card-icon-bg" style="background:#0084FF;">知</div><span class="mobile-card-name">知乎</span></div>
            <p class="mobile-card-desc">专业问答知识社区</p>
          </a>
          <a href="#" class="mobile-more-card">
            <span class="mobile-more-plus">+</span>
            <span class="mobile-more-text">更多</span>
          </a>
        </div>
      </section>

    </div><!-- End .mobile-content -->

    <!-- Bottom Tab Bar -->
    <nav class="mobile-bottom-bar">
      <div class="mobile-pill">
        <a href="#" class="mobile-tab active">
          <span>🏠</span><span class="tab-label">首页</span>
        </a>
        <a href="#" class="mobile-tab">
          <span>🧭</span><span class="tab-label">发现</span>
        </a>
        <a href="#" class="mobile-tab">
          <span>👤</span><span class="tab-label">我的</span>
        </a>
      </div>
    </nav>

  </div><!-- End .mobile-container -->

</body>
</html>
